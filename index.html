<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jundezain Studio — Perangkat Lunak Bisnis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF9F5; --surface:#FFFFFF; --ink:#1A1D23; --ink-soft:#5B5E68;
    --navy:#14213D; --navy-2:#1E2E52; --gold:#B8862B; --gold-soft:#F1E4C8;
    --sage:#52795C; --border:#E4E1D4; --danger:#A23B2E;
    --font-display:'Source Serif 4',Georgia,serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-body);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  img{max-width:100%;display:block;}

  .seal{border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;position:relative;font-family:var(--font-display);font-weight:600;color:var(--gold);flex-shrink:0;}
  .seal::before{content:'';position:absolute;inset:5px;border:1px dashed var(--gold);border-radius:50%;opacity:.5;}

  .nav{position:sticky;top:0;z-index:100;background:rgba(250,249,245,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--border);}
  .nav-inner{max-width:1080px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;justify-content:space-between;}
  .nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
  .nav-brand .seal{width:34px;height:34px;font-size:12px;}
  .nav-brand-name{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--navy);}
  .nav-links{display:flex;gap:32px;font-size:13.5px;color:var(--ink-soft);}
  .nav-links a{cursor:pointer;}
  .nav-links a:hover{color:var(--navy);}

  .hero{max-width:720px;margin:0 auto;padding:100px 28px 80px;text-align:center;}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:22px;}
  .hero h1{font-family:var(--font-display);font-size:44px;line-height:1.18;font-weight:600;color:var(--navy);margin:0 0 22px;}
  .hero h1 em{font-style:italic;color:var(--gold);}
  .hero p{font-size:16px;line-height:1.7;color:var(--ink-soft);max-width:520px;margin:0 auto 34px;}
  .btn-primary{display:inline-block;background:var(--navy);color:#fff;border:none;padding:14px 30px;border-radius:3px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);transition:background .15s;}
  .btn-primary:hover{background:var(--navy-2);}
  .btn-ghost{display:inline-block;background:transparent;color:var(--navy);border:1px solid var(--border);padding:13px 28px;border-radius:3px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body);margin-left:12px;transition:border-color .15s;}
  .btn-ghost:hover{border-color:var(--navy);}

  .section{max-width:1080px;margin:0 auto;padding:70px 28px;}
  .section-head{text-align:center;margin-bottom:52px;}
  .section-head .eyebrow{margin-bottom:14px;}
  .section-head h2{font-family:var(--font-display);font-size:30px;font-weight:600;color:var(--navy);margin:0 0 12px;}
  .section-head p{color:var(--ink-soft);font-size:14.5px;max-width:480px;margin:0 auto;}

  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
  .product-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s;}
  .product-card.live:hover{border-color:var(--gold);transform:translateY(-3px);}
  .product-thumb{height:150px;display:flex;align-items:center;justify-content:center;background:var(--navy);position:relative;}
  .product-thumb .seal{width:64px;height:64px;font-size:22px;border-color:var(--gold);}
  .product-thumb.dim{background:#EAE8E0;}
  .product-thumb.dim .seal{border-color:#B9B6A9;color:#B9B6A9;}
  .product-thumb.dim .seal::before{border-color:#B9B6A9;}
  .product-body{padding:24px 22px 22px;display:flex;flex-direction:column;flex:1;}
  .product-cat{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
  .product-title{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--navy);margin:0 0 8px;}
  .product-desc{font-size:13px;color:var(--ink-soft);line-height:1.6;flex:1;margin:0 0 18px;}
  .product-price{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
  .product-price b{color:var(--navy);font-size:15px;font-family:var(--font-display);}
  .product-btn{display:block;text-align:center;padding:11px;border-radius:3px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--navy);color:var(--navy);background:transparent;font-family:var(--font-body);transition:background .15s,color .15s;}
  .product-btn:hover{background:var(--navy);color:#fff;}
  .product-btn.disabled{border-color:var(--border);color:#B9B6A9;cursor:not-allowed;}
  .product-btn.disabled:hover{background:transparent;color:#B9B6A9;}
  .badge-soon{display:inline-block;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.05em;color:#8A8778;background:#EAE8E0;padding:3px 9px;border-radius:20px;position:absolute;top:12px;right:12px;}

  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:36px;}
  .step{text-align:center;}
  .step-num{width:38px;height:38px;border-radius:50%;background:var(--navy);color:var(--gold);font-family:var(--font-display);font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  .step h3{font-family:var(--font-display);font-size:16px;color:var(--navy);margin:0 0 8px;font-weight:600;}
  .step p{font-size:13px;color:var(--ink-soft);line-height:1.6;margin:0;}

  .footer{border-top:1px solid var(--border);padding:36px 28px;text-align:center;}
  .footer .seal{width:30px;height:30px;font-size:10px;margin:0 auto 12px;}
  .footer p{font-size:12px;color:var(--ink-soft);margin:4px 0;}

  .checkout-wrap{max-width:1080px;margin:0 auto;padding:40px 28px 90px;}
  .back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);cursor:pointer;margin-bottom:32px;}
  .back-link:hover{color:var(--navy);}

  .product-hero{display:grid;grid-template-columns:1.1fr 1fr;gap:56px;margin-bottom:60px;align-items:center;}
  .product-hero-visual{background:var(--navy);border-radius:6px;padding:52px 40px;text-align:center;}
  .product-hero-visual .seal{width:88px;height:88px;font-size:30px;border-color:var(--gold);margin:0 auto 20px;}
  .product-hero-visual h3{font-family:var(--font-display);color:#fff;font-size:19px;margin:0;font-weight:600;}
  .product-hero-visual span{font-family:var(--font-mono);font-size:10.5px;color:#9AA4BB;letter-spacing:.06em;}
  .product-hero-text .eyebrow{margin-bottom:16px;}
  .product-hero-text h1{font-family:var(--font-display);font-size:32px;font-weight:600;color:var(--navy);margin:0 0 16px;line-height:1.2;}
  .product-hero-text p{font-size:14.5px;color:var(--ink-soft);line-height:1.75;margin:0 0 24px;}
  .feature-list{list-style:none;padding:0;margin:0;}
  .feature-list li{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:var(--ink);padding:7px 0;}
  .feature-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);margin-top:8px;flex-shrink:0;}

  .checkout-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:48px;align-items:start;}
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:36px;}
  .form-card h2{font-family:var(--font-display);font-size:20px;color:var(--navy);margin:0 0 26px;font-weight:600;}
  .field-label{font-size:12.5px;color:var(--ink-soft);display:block;margin-bottom:6px;font-weight:500;}
  .field-input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:3px;font-size:14px;font-family:var(--font-body);margin-bottom:20px;background:var(--paper);}
  .field-input:focus{outline:none;border-color:var(--gold);background:#fff;}

  .package-options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
  .package-card{border:1.5px solid var(--border);border-radius:5px;padding:16px 16px;cursor:pointer;transition:border-color .15s,background .15s;}
  .package-card:hover{border-color:var(--gold);}
  .package-card.selected{border-color:var(--navy);background:var(--gold-soft);}
  .package-card .pk-name{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:4px;}
  .package-card .pk-price{font-family:var(--font-display);font-size:19px;color:var(--navy);font-weight:600;}
  .package-card .pk-period{font-size:11px;color:var(--ink-soft);}
  .package-card .pk-note{font-size:10.5px;color:var(--gold);margin-top:6px;font-family:var(--font-mono);}

  .pay-options{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;}
  .pay-card{flex:1;min-width:150px;border:1.5px solid var(--border);border-radius:5px;padding:13px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--ink);transition:border-color .15s,background .15s;}
  .pay-card:hover{border-color:var(--gold);}
  .pay-card.selected{border-color:var(--navy);background:var(--gold-soft);}
  .pay-card .pay-sub{font-size:10.5px;color:var(--ink-soft);font-weight:400;margin-top:2px;}

  .summary-card{background:var(--navy);color:#fff;border-radius:6px;padding:28px;position:sticky;top:90px;}
  .summary-card h3{font-family:var(--font-display);font-size:16px;margin:0 0 20px;font-weight:600;color:var(--gold);}
  .summary-row{display:flex;justify-content:space-between;font-size:13px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.12);color:#D2D6E0;}
  .summary-row.total{border-bottom:none;padding-top:16px;font-size:15px;font-weight:600;color:#fff;}
  .summary-row.total span:last-child{font-family:var(--font-display);color:var(--gold);font-size:19px;}
  .checkout-btn{width:100%;background:var(--gold);color:var(--navy);border:none;padding:15px;border-radius:3px;font-size:14px;font-weight:600;cursor:pointer;margin-top:22px;font-family:var(--font-body);transition:opacity .15s;}
  .checkout-btn:hover{opacity:.9;}
  .summary-note{font-size:11px;color:#9AA4BB;margin-top:14px;line-height:1.6;}

  .success-wrap{max-width:560px;margin:80px auto;padding:0 28px;text-align:center;}
  .success-seal{width:64px;height:64px;border-radius:50%;background:var(--gold-soft);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 26px;font-size:26px;color:var(--gold);}
  .success-wrap h1{font-family:var(--font-display);font-size:26px;color:var(--navy);margin:0 0 14px;font-weight:600;}
  .success-wrap p{font-size:14px;color:var(--ink-soft);line-height:1.7;margin:0 0 24px;}
  .order-ref{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:26px;text-align:left;}
  .order-ref .row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;color:var(--ink-soft);}
  .order-ref .row b{color:var(--ink);font-weight:500;}
  .order-ref .row.ref{font-family:var(--font-mono);color:var(--navy);font-weight:600;}

  @media (max-width:760px){
    .gallery{grid-template-columns:1fr;}
    .steps{grid-template-columns:1fr;gap:28px;}
    .product-hero{grid-template-columns:1fr;gap:32px;}
    .checkout-grid{grid-template-columns:1fr;}
    .package-options{grid-template-columns:1fr;}
    .hero h1{font-size:32px;}
    .nav-links{display:none;}
    .summary-card{position:static;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// URL Web App "Penjaga Lisensi" — endpoint yang menerima pesanan & mengirim struk otomatis
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxeXuzel23cu8LChbEf9duWBfpl4nx5QF9bscxk3C9HjeVHQW6eOU8NVPCySBT5AV1hhg/exec';

const PRODUCTS = [
  {
    id: 'konsultan-pajak',
    live: true,
    kategori: 'Perpajakan',
    nama: 'Aplikasi Konsultan Pajak',
    ringkas: 'Kelola klien, pekerjaan, reminder pajak, invoice, dan dokumen — semua dalam satu portal.',
    hargaMulai: 'Rp 2.500.000',
    tagline: 'Satu portal untuk seluruh operasional kantor konsultan pajak Anda',
    deskripsi: 'Dirancang khusus untuk kantor konsultan pajak yang ingin lepas dari pencatatan manual dan spreadsheet tercecer — mulai dari data klien, penugasan tim, sampai reminder jatuh tempo pajak, semuanya di satu tempat.',
    fitur: [
      'Manajemen Klien lengkap (Orang Pribadi & Badan Usaha)',
      'Penugasan & pelacakan pekerjaan tim, lengkap alur persetujuan',
      'Reminder otomatis jatuh tempo kewajiban pajak per klien',
      'Invoice resmi siap cetak A5, terhubung ke ringkasan keuangan',
      'Kalender & agenda terpadu dari seluruh modul',
      'Data tersimpan di Google Sheets & Drive milik Anda sendiri',
    ],
    paket: {
      lifetime: { nama: 'Seumur Hidup', harga: 'Rp 2.500.000', hargaAngka: 2500000, periode: 'sekali bayar', catatan: 'Gratis update selamanya' },
      langganan: { nama: 'Berlangganan', harga: 'Rp 450.000', hargaAngka: 450000, periode: '/ tahun', catatan: 'Termasuk dukungan prioritas' },
    },
  },
  {
    id: 'klinik-apotek',
    live: false,
    kategori: 'Kesehatan',
    nama: 'Aplikasi Klinik & Apotek',
    ringkas: 'Rekam medis, antrian pasien, dan stok obat dalam satu sistem terintegrasi.',
    hargaMulai: 'Segera Hadir',
  },
  {
    id: 'koperasi',
    live: false,
    kategori: 'Keuangan',
    nama: 'Aplikasi Koperasi Simpan Pinjam',
    ringkas: 'Kelola simpanan, pinjaman, dan angsuran anggota koperasi secara rapi.',
    hargaMulai: 'Segera Hadir',
  },
];

const state = {
  page: 'landing',
  activeProductId: null,
  selectedPaket: 'lifetime',
  selectedPay: 'transfer',
  lastOrder: null,
};

const payLabels = {
  transfer: { nama: 'Transfer Bank Manual', sub: 'BCA / Mandiri / BNI' },
  qris: { nama: 'QRIS', sub: 'Scan & bayar via e-wallet' },
};

function goTo(page, productId){
  state.page = page;
  if (productId) state.activeProductId = productId;
  window.scrollTo(0,0);
  render();
}

function renderNav(){
  return `<div class="nav"><div class="nav-inner">
    <div class="nav-brand" onclick="goTo('landing')">
      <div class="seal">JD</div>
      <div class="nav-brand-name">Jundezain Studio</div>
    </div>
    <div class="nav-links">
      <a onclick="document.getElementById('gallery-anchor').scrollIntoView({behavior:'smooth'})">Produk</a>
      <a onclick="document.getElementById('cara-kerja-anchor').scrollIntoView({behavior:'smooth'})">Cara Kerja</a>
      <a href="mailto:halo@jundezain.id">Kontak</a>
    </div>
  </div></div>`;
}

function renderLanding(){
  const productsHtml = PRODUCTS.map(p => {
    if (!p.live){
      return `<div class="product-card" style="position:relative;">
        <span class="badge-soon">Segera Hadir</span>
        <div class="product-thumb dim"><div class="seal">${p.nama.split(' ').map(w=>w[0]).slice(0,2).join('')}</div></div>
        <div class="product-body">
          <div class="product-cat">${p.kategori}</div>
          <div class="product-title">${p.nama}</div>
          <p class="product-desc">${p.ringkas}</p>
          <div class="product-price">${p.hargaMulai}</div>
          <button class="product-btn disabled" disabled>Belum Tersedia</button>
        </div>
      </div>`;
    }
    return `<div class="product-card live">
      <div class="product-thumb"><div class="seal">KP</div></div>
      <div class="product-body">
        <div class="product-cat">${p.kategori}</div>
        <div class="product-title">${p.nama}</div>
        <p class="product-desc">${p.ringkas}</p>
        <div class="product-price">Mulai dari <b>${p.hargaMulai}</b></div>
        <button class="product-btn" onclick="goTo('checkout','${p.id}')">Lihat Detail</button>
      </div>
    </div>`;
  }).join('');

  return `
  ${renderNav()}
  <div class="hero">
    <div class="eyebrow">Studio Perangkat Lunak Bisnis</div>
    <h1>Perangkat lunak <em>fokus</em>,<br>dibuat untuk kebutuhan spesifik bisnis Anda</h1>
    <p>Kami membangun aplikasi yang dirancang khusus untuk satu jenis usaha — bukan solusi umum yang dipaksakan. Data Anda, kendali penuh Anda.</p>
    <button class="btn-primary" onclick="document.getElementById('gallery-anchor').scrollIntoView({behavior:'smooth'})">Lihat Produk Kami</button>
    <a href="mailto:halo@jundezain.id" class="btn-ghost">Hubungi Kami</a>
  </div>

  <div class="section" id="gallery-anchor">
    <div class="section-head">
      <div class="eyebrow">Katalog Produk</div>
      <h2>Pilih aplikasi sesuai kebutuhan Anda</h2>
      <p>Setiap produk dibangun khusus untuk satu jenis usaha, bukan versi umum yang serba bisa.</p>
    </div>
    <div class="gallery">${productsHtml}</div>
  </div>

  <div class="section" id="cara-kerja-anchor" style="background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
    <div class="section-head">
      <div class="eyebrow">Cara Kerja</div>
      <h2>Dari pesan sampai siap pakai</h2>
    </div>
    <div class="steps">
      <div class="step"><div class="step-num">1</div><h3>Pilih Produk &amp; Paket</h3><p>Tentukan aplikasi dan pilih paket Seumur Hidup atau Berlangganan sesuai kebutuhan.</p></div>
      <div class="step"><div class="step-num">2</div><h3>Checkout &amp; Pembayaran</h3><p>Isi data pemesanan, lakukan pembayaran sesuai instruksi yang diberikan.</p></div>
      <div class="step"><div class="step-num">3</div><h3>Terima Kode Lisensi</h3><p>Setelah pembayaran dikonfirmasi, kode lisensi &amp; panduan aktivasi dikirim ke email Anda.</p></div>
    </div>
  </div>

  <div class="footer">
    <div class="seal">JD</div>
    <p>Jundezain Studio — Perangkat lunak bisnis yang dibuat khusus, bukan generik.</p>
    <p style="opacity:.6;">&copy; 2026 Jundezain. Seluruh hak cipta dilindungi.</p>
  </div>`;
}

function selectPaket(key){ state.selectedPaket = key; render(); }
function selectPay(key){ state.selectedPay = key; render(); }

function renderCheckout(){
  const p = PRODUCTS.find(x=>x.id===state.activeProductId);
  if (!p) return renderLanding();
  const paket = p.paket[state.selectedPaket];

  return `
  ${renderNav()}
  <div class="checkout-wrap">
    <div class="back-link" onclick="goTo('landing')">&larr; Kembali ke Katalog Produk</div>

    <div class="product-hero">
      <div class="product-hero-visual">
        <div class="seal">KP</div>
        <h3>${p.nama}</h3>
        <span>PORTAL KONSULTAN PAJAK</span>
      </div>
      <div class="product-hero-text">
        <div class="eyebrow">${p.kategori}</div>
        <h1>${p.tagline}</h1>
        <p>${p.deskripsi}</p>
        <ul class="feature-list">
          ${p.fitur.map(f=>`<li>${f}</li>`).join('')}
        </ul>
      </div>
    </div>

    <div class="checkout-grid">
      <div class="form-card">
        <h2>Form Pemesanan</h2>
        <form onsubmit="handleCheckoutSubmit(event)">
          <label class="field-label">Nama Pemesan / Kantor</label>
          <input class="field-input" type="text" id="co-nama" placeholder="Contoh: Kantor Konsultan Pajak Sinergi" required>

          <label class="field-label">Email</label>
          <input class="field-input" type="email" id="co-email" placeholder="nama@kantorpajak.id" required>

          <label class="field-label">Nomor WhatsApp</label>
          <input class="field-input" type="text" id="co-wa" placeholder="08xx-xxxx-xxxx" required>

          <label class="field-label">Pilih Paket</label>
          <div class="package-options">
            <div class="package-card ${state.selectedPaket==='lifetime'?'selected':''}" onclick="selectPaket('lifetime')">
              <div class="pk-name">${p.paket.lifetime.nama}</div>
              <div class="pk-price">${p.paket.lifetime.harga}</div>
              <div class="pk-period">${p.paket.lifetime.periode}</div>
              <div class="pk-note">${p.paket.lifetime.catatan}</div>
            </div>
            <div class="package-card ${state.selectedPaket==='langganan'?'selected':''}" onclick="selectPaket('langganan')">
              <div class="pk-name">${p.paket.langganan.nama}</div>
              <div class="pk-price">${p.paket.langganan.harga}</div>
              <div class="pk-period">${p.paket.langganan.periode}</div>
              <div class="pk-note">${p.paket.langganan.catatan}</div>
            </div>
          </div>

          <label class="field-label">Metode Pembayaran</label>
          <div class="pay-options">
            <div class="pay-card ${state.selectedPay==='transfer'?'selected':''}" onclick="selectPay('transfer')">
              Transfer Bank Manual<div class="pay-sub">BCA / Mandiri / BNI</div>
            </div>
            <div class="pay-card ${state.selectedPay==='qris'?'selected':''}" onclick="selectPay('qris')">
              QRIS<div class="pay-sub">Scan & bayar via e-wallet</div>
            </div>
          </div>

          <div id="checkout-error" style="display:none;background:#F3E1DC;color:var(--danger);font-size:12.5px;padding:10px 13px;border-radius:5px;margin-bottom:16px;"></div>

          <button class="checkout-btn" type="submit">Checkout Sekarang</button>
        </form>
      </div>

      <div class="summary-card">
        <h3>Ringkasan Pesanan</h3>
        <div class="summary-row"><span>Produk</span><span>${p.nama}</span></div>
        <div class="summary-row"><span>Paket</span><span>${paket.nama}</span></div>
        <div class="summary-row"><span>Metode Bayar</span><span>${payLabels[state.selectedPay].nama}</span></div>
        <div class="summary-row total"><span>Total</span><span>${paket.harga}</span></div>
        <div class="summary-note">Struk pemesanan akan otomatis dikirim ke email Anda. Kode lisensi menyusul setelah pembayaran dikonfirmasi oleh tim kami (biasanya dalam 1x24 jam kerja).</div>
      </div>
    </div>
  </div>`;
}

async function handleCheckoutSubmit(ev){
  ev.preventDefault();
  const p = PRODUCTS.find(x=>x.id===state.activeProductId);
  const paket = p.paket[state.selectedPaket];
  const nama = document.getElementById('co-nama').value.trim();
  const email = document.getElementById('co-email').value.trim();
  const wa = document.getElementById('co-wa').value.trim();

  const btn = document.querySelector('.checkout-btn');
  const errorBox = document.getElementById('checkout-error');
  if (errorBox) errorBox.style.display = 'none';
  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = 'Memproses...';

  try {
    const res = await fetch(WEBAPP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // hindari CORS preflight
      body: JSON.stringify({
        action: 'submitOrder',
        namaPemesan: nama,
        email: email,
        whatsapp: wa,
        produk: p.nama,
        paket: paket.nama,
        hargaTotal: paket.hargaAngka,
        metodePembayaran: payLabels[state.selectedPay].nama,
      }),
    });
    const data = JSON.parse(await res.text());

    if (!data.success) throw new Error(data.message || 'Gagal membuat pesanan.');

    state.lastOrder = { nama, email, wa, produk: p.nama, paket: paket.nama, harga: paket.harga, orderNumber: data.orderNumber };
    goTo('success');

  } catch (err) {
    if (errorBox) {
      errorBox.textContent = 'Gagal mengirim pesanan: ' + err.message + ' — silakan coba lagi, atau hubungi kami langsung lewat email.';
      errorBox.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function renderSuccess(){
  const o = state.lastOrder;
  if (!o) return renderLanding();
  return `
  ${renderNav()}
  <div class="success-wrap">
    <div class="success-seal">&#10003;</div>
    <h1>Pesanan Anda Berhasil Dibuat</h1>
    <p>Terima kasih, ${o.nama}. Struk pemesanan telah dikirim ke <b>${o.email}</b>. Kode lisensi akan menyusul ke email yang sama setelah pembayaran Anda kami konfirmasi.</p>
    <div class="order-ref">
      <div class="row ref"><span>Nomor Pesanan</span><b>${o.orderNumber}</b></div>
      <div class="row"><span>Produk</span><b>${o.produk}</b></div>
      <div class="row"><span>Paket</span><b>${o.paket}</b></div>
      <div class="row"><span>Total</span><b>${o.harga}</b></div>
      <div class="row"><span>Status</span><b style="color:var(--gold);">Menunggu Pembayaran</b></div>
    </div>
    <button class="btn-primary" onclick="goTo('landing')">Kembali ke Beranda</button>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  if (state.page === 'landing') app.innerHTML = renderLanding();
  else if (state.page === 'checkout') app.innerHTML = renderCheckout();
  else if (state.page === 'success') app.innerHTML = renderSuccess();
}
render();
</script>
</body>
</html>
